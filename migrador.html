<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Uploader de Serviços - Horizontina</title>
    <!-- 1. BLOCO DE CONEXÃO COM O FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- 2. BLOCO DE IMPORTAÇÃO DOS SEUS ARQUIVOS JS LOCAIS -->
    <script>const bdServicos = [];</script>
    <script src="servicos/gabinete.js"></script>
    <script src="servicos/planejamento.js"></script>
    <script src="servicos/administracao.js"></script>
    <script src="servicos/fazenda.js"></script>
    <script src="servicos/infraestrutura.js"></script>
    <script src="servicos/saude.js"></script>
    <script src="servicos/educacao.js"></script>
    <script src="servicos/desenvolvimento_social.js"></script>
    <script src="servicos/desenvolvimento_economico.js"></script>
    <script src="servicos/desenvolvimento_rural.js"></script>
    <script src="servicos/esporte_cultura.js"></script>
    <script src="servicos/governo.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px; background-color: #f3f4f6;">

    <!-- 3. BLOCO VISUAL (A TELA DO MIGRADOR) -->
    <div style="background-color: white; padding: 40px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px;">
        <h1 style="color: #002B5E; margin-bottom: 10px;">Painel de Migração</h1>
        <p style="color: #666; margin-bottom: 30px;">Clique no botão abaixo para enviar todos os serviços das secretarias locais para o Firebase.</p>
        
        <button id="btn-enviar" onclick="enviarParaOFirebase()" style="background-color: #002B5E; color: white; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s;">
            🚀 Enviar Dados para a Nuvem
        </button>
        
        <div id="status" style="margin-top: 20px; font-weight: bold; color: #333;">Aguardando comando...</div>
    </div>

    <!-- 4. BLOCO LOGICO DE ENVIO -->
    <script>
        // Configurações da sua conta do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAZk6WrwIHn3iRjT41Ju0GToc01XJhFrtE",
            authDomain: "carta-servicos-horizontina.firebaseapp.com",
            projectId: "carta-servicos-horizontina",
            storageBucket: "carta-servicos-horizontina.firebasestorage.app",
            messagingSenderId: "782471493827",
            appId: "1:782471493827:web:96548c54f925a80a404a76"
        };

        // Liga o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // A função que faz o trabalho pesado
        async function enviarParaOFirebase() {
            const botao = document.getElementById('btn-enviar');
            const statusDiv = document.getElementById('status');
            
            // Trava o botão para evitar cliques duplicados
            botao.disabled = true;
            botao.style.backgroundColor = '#ccc';
            statusDiv.innerHTML = "⏳ Enviando dados... por favor, aguarde.";
            statusDiv.style.color = "orange";

            try {
                // Envia toda a lista de uma vez só para um documento único de forma econômica
                await db.collection('catalogo').doc('todosOsServicos').set({
                    servicos: bdServicos
                });

                statusDiv.innerHTML = "✅ Sucesso! Tudo gravado no Firebase com apenas 1 gravação!";
                statusDiv.style.color = "green";
                console.log("Enviado com sucesso:", bdServicos);
            } catch (erro) {
                statusDiv.innerHTML = "❌ Erro ao enviar: " + erro.message;
                statusDiv.style.color = "red";
                console.error("Erro completo:", erro);
                
                // Destrava o botão caso dê erro, para você poder tentar de novo
                botao.disabled = false;
                botao.style.backgroundColor = '#002B5E';
            }
        }
    </script>
</body>
</html>
