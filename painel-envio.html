<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle de Envio - Horizontina</title>
    <!-- Conexão oficial com o Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Importação de todos os seus arquivos locais (.js) de serviços -->
    <script>const bdServicos = [];</script>
    <script src="servicos/gabinete.js"></script>
    <script src="servicos/planejamento.js"></script>
    <script src="servicos/administracao.js"></script>
    <script src="servicos/fazenda.js"></script>
    <script src="servicos/infraestrutura.js"></script>
    <script src="servicos/saude.js"></script>
    <script src="servicos/educacao.js"></script>
    <script src="servicos/desenvolvimento_social.js"></script>
    <script src="servicos/desenvolvimento_economico.js"></script>
    <script src="servicos/desenvolvimento_rural.js"></script>
    <script src="servicos/esporte_cultura.js"></script>
    <script src="servicos/governo.js"></script>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f3f4f6; padding: 30px; margin: 0;">

    <div style="max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <h1 style="color: #002B5E; margin-top: 0;">Controle de Envio de Serviços</h1>
        <p style="color: #555; margin-bottom: 35px;">Gerencie o envio dos seus serviços locais para o Firebase. Você pode enviar um por um para ver o processo acontecer.</p>

        <!-- Tabela Visual de Serviços -->
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background-color: #002B5E; color: white;">
                    <th style="padding: 12px; border-radius: 6px 0 0 6px;">ID</th>
                    <th style="padding: 12px;">Serviço</th>
                    <th style="padding: 12px;">Secretaria</th>
                    <th style="padding: 12px; text-align: center; border-radius: 0 6px 6px 0;">Ação</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <!-- O JavaScript vai desenhar as linhas aqui -->
            </tbody>
        </table>
    </div>

    <script>
        // Configurações do seu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAZk6WrwIHn3iRjT41Ju0GToc01XJhFrtE",
            authDomain: "carta-servicos-horizontina.firebaseapp.com",
            projectId: "carta-servicos-horizontina",
            storageBucket: "carta-servicos-horizontina.firebasestorage.app",
            messagingSenderId: "782471493827",
            appId: "1:782471493827:web:96548c54f925a80a404a76"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Esse bloco roda assim que a página abre, desenhando a tabela
        window.onload = () => {
            const corpo = document.getElementById('tabela-corpo');
            
            // Organiza a lista do menor ID para o maior para ficar fácil de ler
            const ordenados = [...bdServicos].sort((a, b) => a.id - b.id);

            ordenados.forEach(serv => {
                const linha = document.createElement('tr');
                linha.style.borderBottom = "1px solid #ddd";
                linha.innerHTML = `
                    <td style="padding: 15px; font-weight: bold; color: #333;">ID ${serv.id}</td>
                    <td style="padding: 15px; color: #555;">${serv.titulo}</td>
                    <td style="padding: 15px; color: #777; font-size: 14px;">${serv.secretaria}</td>
                    <td style="padding: 15px; text-align: center;">
                        <button id="btn-${serv.id}" onclick="enviarServico(${serv.id})" style="background-color: #002B5E; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">
                            📤 Enviar para Nuvem
                        </button>
                    </td>
                `;
                corpo.appendChild(linha);
            });
        };

        // Esse bloco é o botão que envia o serviço de forma organizada (tipo Map)
        async function enviarServico(id) {
            const botao = document.getElementById(`btn-${id}`);
            const servicoOriginal = bdServicos.find(s => s.id === id);

            if (!servicoOriginal) return;

            // Muda o visual do botão para mostrar que está trabalhando
            botao.disabled = true;
            botao.style.backgroundColor = "orange";
            botao.innerText = "⏳ Enviando...";

            try {
                // Prepara a caixa organizada com a etiqueta "ID_XX"
                const dadoParaEnviar = {
                    [`ID_${id}`]: servicoOriginal
                };

                // Envia para o Firebase sem apagar os outros IDs usando o merge: true
                await db.collection('catalogo').doc('todosOsServicos').set(dadoParaEnviar, { merge: true });

                // Sucesso!
                botao.style.backgroundColor = "green";
                botao.innerText = "✅ Gravado!";
            } catch (erro) {
                console.error("Erro no envio:", erro);
                botao.disabled = false;
                botao.style.backgroundColor = "red";
                botao.innerText = "❌ Erro";
            }
        }
    </script>
</body>
</html>
